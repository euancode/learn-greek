<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ελληνικά — Learn Greek</title>
<meta name="description" content="Learn the Greek alphabet, 1000 common words, and essential phrases — works offline.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12141a">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Learn Greek">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cardo:ital@0;1&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12141a; --surface:#1c1f28; --card:#222630;
  --gold:#d6a93a; --gold-light:#eacc7a; --gold-dim:#7a5e20;
  --white:#ede7d4; --muted:#8a92a4;
  --accent:#5b90c5; --accent-light:#84b2dc;
  --border:rgba(214,169,58,0.14); --radius:10px;
  /* Learned = teal */
  --L-bg:#0b2828; --L-border:#1c5c5c; --L-text:#52cdcd;
  /* New (in phrase list, not yet learned) = warm amber */
  --N-bg:#221c08; --N-border:#6a5414; --N-text:#dcc84a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--white);font-family:'Cardo',Georgia,serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 8%,rgba(91,144,197,.07) 0%,transparent 55%),radial-gradient(ellipse 55% 65% at 85% 92%,rgba(214,169,58,.05) 0%,transparent 55%);pointer-events:none;z-index:0}

/* NAV */
.top-nav{position:sticky;top:0;z-index:100;background:rgba(18,20,26,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.top-nav-inner{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:stretch}
.nav-logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.05rem;padding:12px 16px 12px 0;border-right:1px solid var(--border);margin-right:6px;display:flex;align-items:center;white-space:nowrap}
.nav-tabs{display:flex;gap:2px;flex:1;align-items:center;padding:6px 0}
.nav-tab{background:none;border:none;color:var(--muted);font-family:'Cardo',serif;font-size:.88rem;padding:7px 14px;border-radius:7px;cursor:pointer;transition:all .18s;letter-spacing:.04em;white-space:nowrap}
.nav-tab:hover{color:var(--white);background:rgba(255,255,255,.05)}
.nav-tab.active{background:var(--gold);color:#111;font-weight:bold}
.nav-stats{margin-left:auto;display:flex;align-items:center;gap:8px;padding:0 0 0 12px;border-left:1px solid var(--border)}
.stat-badge{font-family:'Fira Mono',monospace;font-size:.67rem;color:var(--muted);white-space:nowrap}
.stat-pct{font-family:'Fira Mono',monospace;font-size:.75rem;color:var(--L-text);font-weight:600}
.mini-bar{width:52px;height:5px;background:var(--surface);border-radius:3px;overflow:hidden}
.mini-bar-fill{height:100%;background:var(--L-text);border-radius:3px;transition:width .5s}

/* SECTIONS */
.section{display:none;position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:18px 16px 60px}
.section.active{display:block}

/* ALPHABET */
.alpha-header{text-align:center;padding:20px 0 24px}
.alpha-title{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,4vw,2.7rem);color:var(--gold);margin-bottom:4px}
.alpha-sub{font-style:italic;color:var(--muted);font-size:.92rem}
.tab-nav{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;margin:0 auto 24px}
.tab-btn{background:none;border:none;color:var(--muted);font-family:'Cardo',serif;font-size:.88rem;padding:6px 18px;border-radius:7px;cursor:pointer;transition:all .2s;letter-spacing:.04em}
.tab-btn:hover{color:var(--white)}
.tab-btn.active{background:var(--gold);color:#111;font-weight:bold}
.progress-bar{height:3px;background:var(--surface);border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width .4s}
.letter-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 22px 20px;margin-bottom:12px;position:relative;animation:cIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes cIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.letter-card::before{content:attr(data-n);position:absolute;top:14px;right:16px;font-family:'Fira Mono',monospace;font-size:.65rem;color:var(--gold-dim);letter-spacing:.1em}
.greek-display{display:flex;align-items:baseline;gap:14px;margin-bottom:16px}
.greek-main{font-family:'Playfair Display',serif;font-size:clamp(4rem,11vw,7rem);line-height:1;color:var(--gold);text-shadow:0 0 48px rgba(214,169,58,.2)}
.greek-upper{font-family:'Playfair Display',serif;font-size:clamp(2rem,5.5vw,3.5rem);color:var(--gold-light);opacity:.45;line-height:1}
.info-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.info-cell{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 10px;text-align:center}
.info-lbl{font-family:'Fira Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold-dim);margin-bottom:4px}
.info-val{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--white);line-height:1.2}
.info-val.gl{font-family:'Fira Mono',monospace;font-size:.86rem;color:var(--accent-light)}
.info-val.en{font-size:.86rem;color:var(--muted)}
.info-val.pr{font-family:'Fira Mono',monospace;font-size:.76rem;color:#72c9b4;letter-spacing:.03em;line-height:1.3}
.sound-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sound-text{font-size:.81rem;color:var(--muted);line-height:1.5}
.sound-text strong{color:var(--white);font-style:italic;font-weight:normal}
.phonetic-badge{margin-left:auto;flex-shrink:0;background:rgba(91,144,197,.12);border:1px solid rgba(91,144,197,.24);border-radius:6px;padding:2px 7px;font-family:'Fira Mono',monospace;font-size:.72rem;color:var(--accent-light)}
.wds-header{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.wds-lbl{font-family:'Fira Mono',monospace;font-size:.54rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold-dim);flex:1}
.wds-dots{display:flex;gap:4px}
.wds-dot{width:5px;height:5px;border-radius:50%;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.wds-dot.active{background:var(--gold);border-color:var(--gold)}
.sc-btn{background:var(--surface);border:1px solid var(--border);color:var(--gold);width:23px;height:23px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.72rem;transition:all .15s;flex-shrink:0}
.sc-btn:hover:not(:disabled){background:var(--gold);color:#111;border-color:var(--gold)}
.sc-btn:disabled{opacity:.22;cursor:default}
.wds-track{display:flex;gap:9px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;padding:2px 1px 6px}
.wds-track::-webkit-scrollbar{display:none}
.wc{flex:0 0 calc(50% - 5px);min-width:180px;max-width:260px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 12px 10px;scroll-snap-align:start;display:flex;flex-direction:column;gap:4px;transition:border-color .2s}
.wc:hover{border-color:var(--gold-dim)}
.wc.aw{border-color:var(--gold)}
.wc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.wc-gk{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--white);line-height:1.1}
.wc-em{font-size:1.7rem;line-height:1;flex-shrink:0}
.wc-mn{font-style:italic;color:var(--muted);font-size:.81rem}
.wc-tr{font-family:'Fira Mono',monospace;font-size:.68rem;color:var(--accent-light)}
.wc-sy{display:flex;align-items:center;gap:3px;margin-top:1px}
.wc-sy-lbl{font-family:'Fira Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold-dim)}
.wc-sy-val{font-family:'Fira Mono',monospace;font-size:.74rem;color:#72c9b4}
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
.nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--gold);font-family:'Playfair Display',serif;font-size:.9rem;padding:9px 20px;border-radius:var(--radius);cursor:pointer;transition:all .18s;letter-spacing:.04em}
.nav-btn:hover{background:var(--gold);color:#111;border-color:var(--gold);transform:translateY(-1px)}
.nav-btn:disabled{opacity:.28;cursor:not-allowed;transform:none}
.nav-ctr{font-family:'Fira Mono',monospace;font-size:.82rem;color:var(--muted);letter-spacing:.1em}
.dot-nav{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:14px;padding-bottom:4px}
.dot{width:25px;height:25px;border-radius:50%;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-family:'Playfair Display',serif;font-size:.58rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
.dot:hover{border-color:var(--gold);color:var(--gold)}
.dot.active{background:var(--gold);color:#111;border-color:var(--gold);font-weight:bold}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;padding-bottom:30px}
.chart-cell{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 7px 9px;cursor:pointer;transition:all .18s;text-align:center;position:relative}
.chart-cell:hover{border-color:var(--gold);transform:translateY(-2px);background:var(--surface)}
.cc-n{font-family:'Fira Mono',monospace;font-size:.52rem;color:var(--gold-dim);position:absolute;top:5px;right:6px}
.cc-ltrs{display:flex;align-items:baseline;justify-content:center;gap:4px;margin-bottom:2px}
.cc-lo{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--gold);line-height:1}
.cc-up{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold-light);opacity:.55;line-height:1}
.cc-em{font-size:1rem;margin-bottom:2px}
.cc-gl{font-family:'Fira Mono',monospace;font-size:.6rem;color:var(--accent-light);letter-spacing:.05em}
.cc-en{font-size:.67rem;color:var(--muted);font-style:italic;margin-bottom:1px}
.cc-pr{font-family:'Fira Mono',monospace;font-size:.54rem;color:#72c9b4}

/* 1000 WORDS */
.ws-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ws-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold)}
.cat-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'Fira Mono',monospace;font-size:.65rem;padding:4px 10px;border-radius:16px;cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-btn:hover{color:var(--white);border-color:var(--muted)}
.cat-btn.active{background:var(--gold);color:#111;border-color:var(--gold)}
.legend{display:flex;gap:16px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:5px;font-family:'Fira Mono',monospace;font-size:.65rem;color:var(--muted)}
.leg-sw{width:11px;height:11px;border-radius:3px;border:1px solid}
.words-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px}
.word-tile{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .18s;position:relative}
.word-tile:hover{transform:translateY(-1px);border-color:rgba(214,169,58,.38)}
.word-tile.learned{background:#091f1f;border-color:#195555}
.word-tile.learned:hover{border-color:var(--L-text)}
.wt-gk{font-family:'Playfair Display',serif;font-size:1.08rem;color:var(--white);margin-bottom:2px;line-height:1.2}
.word-tile.learned .wt-gk{color:var(--L-text)}
.wt-en{font-size:.77rem;color:var(--muted);font-style:italic;margin-bottom:1px}
.wt-say{font-family:'Fira Mono',monospace;font-size:.61rem;color:var(--accent-light)}
.wt-chk{position:absolute;top:6px;right:7px;font-size:.66rem;color:var(--L-text);font-family:'Fira Mono',monospace}
.words-empty{text-align:center;color:var(--muted);padding:52px 20px;font-style:italic}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.74);z-index:200;backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid rgba(214,169,58,.2);border-radius:16px;width:100%;max-width:490px;max-height:90vh;overflow-y:auto;padding:24px 22px 20px;position:relative;animation:mIn .22s cubic-bezier(.4,0,.2,1)}
@keyframes mIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:12px;right:13px;background:none;border:none;color:var(--muted);font-size:1.05rem;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .15s}
.modal-close:hover{color:var(--white)}
.modal-gk{font-family:'Playfair Display',serif;font-size:2.5rem;color:var(--gold);line-height:1;margin-bottom:3px}
.modal-up{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold-light);opacity:.5;margin-left:7px;vertical-align:baseline}
.modal-en{font-style:italic;color:var(--muted);font-size:.96rem;margin-bottom:14px}
.modal-cells{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:13px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.mc-lbl{font-family:'Fira Mono',monospace;font-size:.54rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold-dim);margin-bottom:4px}
.mc-val{font-family:'Fira Mono',monospace;font-size:.84rem;color:var(--white)}
.mc-val.gl{color:var(--accent-light)}
.mc-val.say{color:#72c9b4}
.m-btn{width:100%;padding:11px;border-radius:var(--radius);border:2px solid;font-family:'Cardo',serif;font-size:.98rem;cursor:pointer;transition:all .2s;letter-spacing:.04em;margin-top:5px;font-weight:bold}
.m-btn.mark{background:transparent;border-color:var(--L-border);color:var(--L-text)}
.m-btn.mark:hover{background:var(--L-text);color:#091f1f;border-color:var(--L-text)}
.m-btn.unmark{background:var(--L-bg);border-color:var(--L-text);color:var(--L-text)}
.m-btn.unmark:hover{background:transparent;border-color:var(--muted);color:var(--muted)}

/* PHRASES */
.ph-hdr{margin-bottom:16px}
.ph-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);margin-bottom:3px}
.ph-sub{color:var(--muted);font-style:italic;font-size:.87rem}
.ph-legend{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.phl-item{display:flex;align-items:center;gap:5px;font-family:'Fira Mono',monospace;font-size:.63rem;color:var(--muted)}
.phl-sw{width:9px;height:9px;border-radius:2px;border:1px solid}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:8px;transition:border-color .18s}
.pc.pl{background:var(--L-bg);border-color:var(--L-border)}
.pc:hover{border-color:rgba(214,169,58,.32)}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:9px;margin-bottom:3px}
.pc-gk{font-family:'Playfair Display',serif;font-size:1.18rem;color:var(--white);line-height:1.3;flex:1}
.pc.pl .pc-gk{color:var(--L-text)}
.pc-mbtn{flex-shrink:0;background:none;border:1px solid var(--border);color:var(--muted);font-family:'Fira Mono',monospace;font-size:.6rem;padding:4px 9px;border-radius:14px;cursor:pointer;transition:all .18s;white-space:nowrap;margin-top:2px}
.pc-mbtn:hover{border-color:var(--L-border);color:var(--L-text)}
.pc.pl .pc-mbtn{background:var(--L-bg);border-color:var(--L-text);color:var(--L-text)}
.pc-en{font-style:italic;color:var(--muted);font-size:.87rem;margin-bottom:5px}
.pc-say{font-family:'Fira Mono',monospace;font-size:.71rem;color:#72c9b4;margin-bottom:8px}
.pc-chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-family:'Fira Mono',monospace;font-size:.65rem;padding:2px 8px;border-radius:14px;border:1px solid;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.cl{background:var(--L-bg);border-color:var(--L-border);color:var(--L-text)}
.chip.cl:hover{border-color:var(--L-text)}
.chip.cn{background:var(--N-bg);border-color:var(--N-border);color:var(--N-text)}
.chip.cn:hover{border-color:var(--N-text)}
.chip.cu{background:rgba(255,255,255,.03);border-color:var(--border);color:var(--muted)}

@media(max-width:560px){
  .info-grid{grid-template-columns:repeat(3,1fr)}
  .wc{flex:0 0 84%}
  .chart-grid{grid-template-columns:repeat(3,1fr)}
  .phonetic-badge,.nav-logo{display:none}
  .nav-tab{padding:7px 8px;font-size:.76rem}
  .modal-cells{grid-template-columns:repeat(2,1fr)}
  .words-grid{grid-template-columns:repeat(auto-fill,minmax(136px,1fr))}
}

/* PWA: install + update controls */
.pwa-btn{background:var(--surface);border:1px solid var(--border);color:var(--gold);width:26px;height:26px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;flex-shrink:0}
.pwa-btn:hover{background:var(--gold);color:#111;border-color:var(--gold)}
.pwa-btn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.install-btn{display:none;background:var(--gold);color:#111;border:none;font-family:'Cardo',serif;font-weight:bold;font-size:.78rem;padding:6px 13px;border-radius:7px;cursor:pointer;letter-spacing:.03em;white-space:nowrap;flex-shrink:0}
.install-btn:hover{background:var(--gold-light)}
.install-btn.show{display:inline-flex;align-items:center;gap:5px}

.pwa-toast-wrap{position:fixed;left:0;right:0;bottom:18px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:300;pointer-events:none}
.pwa-toast{pointer-events:auto;max-width:min(92vw,420px);background:var(--card);border:1px solid rgba(214,169,58,.3);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.4);font-family:'Cardo',serif;font-size:.85rem;color:var(--white);animation:tIn .25s cubic-bezier(.4,0,.2,1)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pwa-toast.offline{border-color:rgba(255,255,255,.12);color:var(--muted)}
.pwa-toast .ico{flex-shrink:0;font-size:1rem}
.pwa-toast .msg{flex:1;line-height:1.3}
.pwa-toast .act{background:var(--gold);color:#111;border:none;font-family:'Cardo',serif;font-weight:bold;font-size:.78rem;padding:6px 13px;border-radius:7px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pwa-toast .act:hover{background:var(--gold-light)}
.pwa-toast .dis{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;padding:2px 4px;flex-shrink:0}
.pwa-toast .dis:hover{color:var(--white)}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="top-nav-inner">
    <div class="nav-logo">Ελληνικά</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="goTo('alphabet')">Alphabet</button>
      <button class="nav-tab" onclick="goTo('words')">1000 Words</button>
      <button class="nav-tab" onclick="goTo('phrases')">Essential Phrases</button>
    </div>
    <div class="nav-stats">
      <span class="stat-badge" id="s-lbl">0 / 0</span>
      <div class="mini-bar"><div class="mini-bar-fill" id="s-bar" style="width:0%"></div></div>
      <span class="stat-pct" id="s-pct">0%</span>
      <button class="install-btn" id="install-btn" title="Install Learn Greek as an app" onclick="pwaInstall()">⤓ Install</button>
      <button class="pwa-btn" id="update-check-btn" title="Check for updates" onclick="pwaCheckForUpdates(true)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
    </div>
  </div>

let LW=new Set(JSON.parse(localStorage.getItem('gk_lw')||'[]'));
let LP=new Set(JSON.parse(localStorage.getItem('gk_lp')||'[]'));
let curLetter=0, wCat='All', pCat='All';

function save(){
  localStorage.setItem('gk_lw',JSON.stringify([...LW]));
  localStorage.setItem('gk_lp',JSON.stringify([...LP]));
  stats();
}
function stats(){
  const tot=WC.reduce((a,c)=>a+c.ws.length,0);
  const n=LW.size, pct=tot?Math.round(n/tot*100):0;
  document.getElementById('s-lbl').textContent=n+' / '+tot;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('s-bar').style.width=pct+'%';
}
function goTo(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  ({alphabet:0,words:1,phrases:2})[name];
  document.querySelectorAll('.nav-tab')[({alphabet:0,words:1,phrases:2})[name]].classList.add('active');
  if(name==='words')renderW();
  if(name==='phrases')renderP();
}

/* ALPHABET */
function aTab(v){
  document.getElementById('al-learn').style.display=v==='learn'?'block':'none';
  document.getElementById('al-chart').style.display=v==='chart'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0)===(v==='learn')));
}
function renderLetter(i){
  const l=AL[i];
  const card=document.getElementById('al-card');
  card.setAttribute('data-n',String(i+1).padStart(2,'0')+' / 24');
  card.innerHTML=`<div class="greek-display"><span class="greek-main">${l.lo}</span><span class="greek-upper">${l.up}</span></div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-lbl">Lowercase</div><div class="info-val">${l.lo}</div></div>
      <div class="info-cell"><div class="info-lbl">Uppercase</div><div class="info-val">${l.up}</div></div>
      <div class="info-cell"><div class="info-lbl">Greeklish</div><div class="info-val gl">${l.gl}</div></div>
      <div class="info-cell"><div class="info-lbl">Name</div><div class="info-val en">${l.name}</div></div>
      <div class="info-cell"><div class="info-lbl">Say it</div><div class="info-val pr">${l.say}</div></div>
    </div>`;
  document.getElementById('al-sound').innerHTML=`<span>🔉</span><div class="sound-text"><strong>${l.name}:</strong> ${l.snd}</div><div class="phonetic-badge">${l.ph}</div>`;
  const ws=document.getElementById('al-words');
  const dots=l.ws.map((_,j)=>`<div class="wds-dot${j===0?' active':''}" data-j="${j}"></div>`).join('');
  const cards=l.ws.map((w,j)=>`<div class="wc${j===0?' aw':''}"><div class="wc-top"><div class="wc-gk">${w.g}</div><div class="wc-em">${w.e}</div></div><div class="wc-mn">${w.m}</div><div class="wc-tr">[ ${w.t} ]</div><div class="wc-sy"><span class="wc-sy-lbl">say it:</span><span class="wc-sy-val">${w.s}</span></div></div>`).join('');
  ws.innerHTML=`<div class="wds-header"><span class="wds-lbl">Example words</span><div class="wds-dots" id="wdots">${dots}</div><button class="sc-btn" id="sc-l" onclick="scW(-1)" disabled>&#8592;</button><button class="sc-btn" id="sc-r" onclick="scW(1)">&#8594;</button></div><div style="overflow:hidden"><div class="wds-track" id="wtrack">${cards}</div></div>`;
  const tr=document.getElementById('wtrack');
  function ua(){document.getElementById('sc-l').disabled=tr.scrollLeft<=4;document.getElementById('sc-r').disabled=tr.scrollLeft>=tr.scrollWidth-tr.clientWidth-4;}
  tr.addEventListener('scroll',()=>{const cw=tr.querySelector('.wc').offsetWidth+9,ai=Math.round(tr.scrollLeft/cw);document.querySelectorAll('.wds-dot').forEach((d,k)=>d.classList.toggle('active',k===ai));document.querySelectorAll('#wtrack .wc').forEach((c,k)=>c.classList.toggle('aw',k===ai));ua();},{passive:true});
  document.getElementById('wdots').addEventListener('click',e=>{const d=e.target.closest('.wds-dot');if(d)tr.scrollTo({left:parseInt(d.dataset.j)*(tr.querySelector('.wc').offsetWidth+9),behavior:'smooth'});});
  document.getElementById('al-prog').style.width=((i+1)/24*100)+'%';
  document.getElementById('al-ctr').textContent=(i+1)+' of 24';
  document.getElementById('al-prev').disabled=i===0;
  document.getElementById('al-next').disabled=i===23;
  document.querySelectorAll('.dot').forEach((d,k)=>d.classList.toggle('active',k===i));
  card.style.animation='none';void card.offsetWidth;card.style.animation='';
}
function scW(dir){const t=document.getElementById('wtrack');if(!t)return;t.scrollBy({left:dir*(t.querySelector('.wc').offsetWidth+9),behavior:'smooth'});}
function alNav(dir){curLetter=Math.max(0,Math.min(23,curLetter+dir));renderLetter(curLetter);}
function buildDots(){
  const n=document.getElementById('al-dots');
  AL.forEach((l,i)=>{const d=document.createElement('button');d.className='dot';d.title=l.name;d.textContent=l.up;d.onclick=()=>{curLetter=i;renderLetter(i);};n.appendChild(d);});
}
function buildChart(){
  const g=document.getElementById('al-cg');
  AL.forEach((l,i)=>{const c=document.createElement('div');c.className='chart-cell';c.innerHTML=`<span class="cc-n">${String(i+1).padStart(2,'0')}</span><div class="cc-ltrs"><span class="cc-lo">${l.lo}</span><span class="cc-up">${l.up}</span></div><div class="cc-em">${l.ws[0].e}</div><div class="cc-gl">${l.gl}</div><div class="cc-en">${l.name}</div><div class="cc-pr">${l.say}</div>`;c.onclick=()=>{curLetter=i;renderLetter(i);aTab('learn');};g.appendChild(c);});
}

/* WORD MODAL */
function openM(w){
  if(typeof w==='string')w=JSON.parse(w);
  const isL=LW.has(w.g);
  document.getElementById('m').innerHTML=`<button class="modal-close" onclick="document.getElementById('mo').classList.remove('open')">✕</button>
    <div style="margin-bottom:4px"><span class="modal-gk">${w.g}</span><span class="modal-up">${w.g.toUpperCase()}</span></div>
    <div class="modal-en">${w.e}</div>
    <div class="modal-cells">
      <div class="mc"><div class="mc-lbl">Greeklish</div><div class="mc-val gl">${w.gl}</div></div>
      <div class="mc"><div class="mc-lbl">Say it</div><div class="mc-val say">${w.s}</div></div>
      <div class="mc"><div class="mc-lbl">Status</div><div class="mc-val" id="m-status" style="color:${isL?'var(--L-text)':'var(--muted)'}">${isL?'✓ Learned':'Not yet'}</div></div>
    </div>
    <button class="m-btn ${isL?'unmark':'mark'}" id="m-btn" onclick="toggleW(${JSON.stringify(w).replace(/"/g,'&quot;')})">${isL?'✓ Learned — tap to unmark':'Mark as learned ✓'}</button>`;
  document.getElementById('mo').classList.add('open');
}
function toggleW(w){
  if(typeof w==='string')w=JSON.parse(w);
  const now=!LW.has(w.g);
  now?LW.add(w.g):LW.delete(w.g);
  save();
  const btn=document.getElementById('m-btn'),st=document.getElementById('m-status');
  if(!btn)return;
  btn.className='m-btn '+(now?'unmark':'mark');
  btn.textContent=now?'✓ Learned — tap to unmark':'Mark as learned ✓';
  st.style.color=now?'var(--L-text)':'var(--muted)';
  st.textContent=now?'✓ Learned':'Not yet';
  if(document.getElementById('sec-words').classList.contains('active'))renderW();
  if(document.getElementById('sec-phrases').classList.contains('active'))renderP();
}
function closeMo(e){if(e.target===document.getElementById('mo'))document.getElementById('mo').classList.remove('open');}

/* 1000 WORDS */
function buildWCats(){
  const el=document.getElementById('w-cats');
  ['All',...WC.map(c=>c.cat)].forEach(cat=>{
    const b=document.createElement('button');b.className='cat-btn'+(cat==='All'?' active':'');b.textContent=cat;
    b.onclick=()=>{wCat=cat;document.querySelectorAll('#w-cats .cat-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderW();};
    el.appendChild(b);
  });
}
function renderW(){
  const g=document.getElementById('w-grid');g.innerHTML='';let n=0;
  WC.forEach(cat=>{
    if(wCat!=='All'&&cat.cat!==wCat)return;
    cat.ws.forEach(w=>{
      const isL=LW.has(w.g);
      const t=document.createElement('div');t.className='word-tile'+(isL?' learned':'');
      t.innerHTML=`<div class="wt-gk">${w.g}</div><div class="wt-en">${w.e}</div><div class="wt-say">${w.s}</div>${isL?'<div class="wt-chk">✓</div>':''}`;
      t.onclick=()=>openM(w);g.appendChild(t);n++;
    });
  });
  document.getElementById('w-empty').style.display=n===0?'block':'none';
}

/* PHRASES */
function buildPCats(){
  const el=document.getElementById('p-cats');
  const cats=['All',...new Set(PH.map(p=>p.cat))];
  cats.forEach(cat=>{
    const b=document.createElement('button');b.className='cat-btn'+(cat==='All'?' active':'');b.textContent=cat;
    b.onclick=()=>{pCat=cat;document.querySelectorAll('#p-cats .cat-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderP();};
    el.appendChild(b);
  });
}
function findW(gr){for(const c of WC){const f=c.ws.find(w=>w.g===gr);if(f)return f;}return null;}
function toggleP(idx){
  const k=String(idx);LP.has(k)?LP.delete(k):LP.add(k);
  save();renderP();
}
function renderP(){
  const list=document.getElementById('p-list');list.innerHTML='';
  const arr=pCat==='All'?PH:PH.filter(p=>p.cat===pCat);
  arr.forEach(ph=>{
    const idx=PH.indexOf(ph),isL=LP.has(String(idx));
    const chips=ph.ws.map(w=>{
      const obj=findW(w);
      if(!obj)return`<span class="chip cu">${w}</span>`;
      const wL=LW.has(w);
      const safe=JSON.stringify(obj).replace(/"/g,'&quot;').replace(/'/g,"\'");
      return`<span class="chip ${wL?'cl':'cn'}" onclick="event.stopPropagation();openM('${safe}')">${w}</span>`;
    }).join('');
    const card=document.createElement('div');
    card.className='pc'+(isL?' pl':'');
    card.innerHTML=`<div class="pc-top"><div class="pc-gk">${ph.gr}</div><button class="pc-mbtn" onclick="toggleP(${idx})">${isL?'✓ Learned':'Mark learned'}</button></div><div class="pc-en">${ph.en}</div><div class="pc-say">[ ${ph.say} ]</div><div class="pc-chips">${chips}</div>`;
    list.appendChild(card);
  });
}

buildDots();buildChart();renderLetter(0);buildWCats();buildPCats();stats();

/* ───────────────────────── PWA: install, update, offline ───────────────────────── */
const APP_VERSION='2026-06-22.1';

function pwaToast({icon='ℹ️',msg,actionLabel,onAction,sticky=false,offline=false,timeout=4200}){
  const wrap=document.getElementById('pwa-toast-wrap');
  const t=document.createElement('div');
  t.className='pwa-toast'+(offline?' offline':'');
  t.innerHTML=`<span class="ico">${icon}</span><span class="msg">${msg}</span>`;
  if(actionLabel){
    const b=document.createElement('button');b.className='act';b.textContent=actionLabel;
    b.onclick=()=>{onAction&&onAction();t.remove()};
    t.appendChild(b);
  }
  const dis=document.createElement('button');dis.className='dis';dis.textContent='✕';dis.onclick=()=>t.remove();
  t.appendChild(dis);
  wrap.appendChild(t);
  if(!sticky)setTimeout(()=>t.remove(),timeout);
  return t;
}

/* Service worker registration + update lifecycle */
let swReg=null;
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      swReg=reg;
      if(reg.waiting)promptUpdate(reg);
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(!nw)return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'){
            if(navigator.serviceWorker.controller)promptUpdate(reg);
          }
        });
      });
      setInterval(()=>reg.update().catch(()=>{}),60*60*1000);
      document.addEventListener('visibilitychange',()=>{
        if(document.visibilityState==='visible')reg.update().catch(()=>{});
      });
    }).catch(err=>console.warn('SW registration failed:',err));

    let refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(refreshing)return;
      refreshing=true;
      window.location.reload();
    });
  });
}

let updateToastShown=false;
function promptUpdate(reg){
  if(updateToastShown)return;
  updateToastShown=true;
  pwaToast({
    icon:'✨',msg:'A new version of Learn Greek is ready.',actionLabel:'Reload',sticky:true,
    onAction:()=>{
      if(reg.waiting)reg.waiting.postMessage('SKIP_WAITING');
    }
  });
}

function pwaCheckForUpdates(manual){
  const btn=document.getElementById('update-check-btn');
  if(!('serviceWorker' in navigator)){
    if(manual)pwaToast({icon:'⚠️',msg:'Service workers aren\'t supported in this browser.'});
    return;
  }
  btn.classList.add('spin');
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(!reg){btn.classList.remove('spin');if(manual)pwaToast({icon:'⚠️',msg:'No service worker registered yet.'});return;}
    reg.update().then(()=>{
      btn.classList.remove('spin');
      setTimeout(()=>{
        if(reg.waiting){promptUpdate(reg);}
        else if(manual){pwaToast({icon:'✓',msg:`You're up to date (v${APP_VERSION}).`});}
      },600);
    }).catch(()=>{
      btn.classList.remove('spin');
      if(manual)pwaToast({icon:'⚠️',msg:'Could not check for updates — check your connection.'});
    });
  });
}

/* Install prompt (beforeinstallprompt) */
let deferredInstall=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredInstall=e;
  document.getElementById('install-btn').classList.add('show');
});
function pwaInstall(){
  if(!deferredInstall)return;
  deferredInstall.prompt();
  deferredInstall.userChoice.finally(()=>{
    deferredInstall=null;
    document.getElementById('install-btn').classList.remove('show');
  });
}
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-btn').classList.remove('show');
  pwaToast({icon:'🎉',msg:'Learn Greek installed! Find it on your home screen / app launcher.'});
});

/* Offline / online indicator */
let offlineToast=null;
function pwaNetStatus(){
  if(!navigator.onLine){
    if(!offlineToast)offlineToast=pwaToast({icon:'📡',msg:'You\'re offline — already-visited pages still work.',sticky:true,offline:true});
  }else if(offlineToast){
    offlineToast.remove();offlineToast=null;
    pwaToast({icon:'✓',msg:'Back online.'});
  }
}
window.addEventListener('online',pwaNetStatus);
window.addEventListener('offline',pwaNetStatus);
if(!navigator.onLine)pwaNetStatus();
